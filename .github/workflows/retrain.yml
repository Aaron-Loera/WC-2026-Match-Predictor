name: Nightly Retrain

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest data
        run: python src/data.py --update
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}

      - name: Build feature matrix
        run: python src/features.py --rebuild

      - name: Retrain model
        run: python src/model.py --retrain

      - name: Simulate tournament & export predictions
        run: python src/simulator.py --simulate --export

      - name: Commit & push artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/model.pkl predictions.json models/training_metrics.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: nightly retrain $(date +%F)"
          git push